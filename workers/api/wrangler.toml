name = "momentum-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "1cfa1fa649f1c943d3cdf07098664682"

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "momentum-db"
database_id = "00000000-0000-0000-0000-000000000000"

# Environment variables (non-secret)
[vars]
CLAUDE_DAILY_CALL_LIMIT = "10"

# Cron: once daily at 07:30 UTC = 15:30 Taiwan time (1hr after market close, data fully published)
[triggers]
crons = ["30 7 * * 1-5"]

# Development settings
[dev]
port = 8787
local_protocol = "http"
