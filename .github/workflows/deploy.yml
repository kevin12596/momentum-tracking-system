name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Provision D1 + Deploy Worker
  # ──────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workers/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      # @deno/shim-deno (transitive dep of yahoo-finance2) uses __dirname at
      # module init time, which Cloudflare Workers does not provide.
      # Patch it out by replacing __dirname/__filename with safe literals.
      - name: Patch @deno/shim-deno for Workers compatibility
        run: |
          SHIM_DIR="node_modules/@deno/shim-deno"
          if [ -d "$SHIM_DIR" ]; then
            find "$SHIM_DIR" -name "*.js" | xargs sed -i \
              's/__dirname/""/g; s/__filename/""/g'
            echo "Patched @deno/shim-deno"
          else
            echo "@deno/shim-deno not found, skipping patch"
          fi

      # Create D1 database (idempotent: OK if already exists)
      - name: Create D1 database
        id: create_d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Try to create; if already exists, list to get existing ID
          CREATE_OUTPUT=$(npx wrangler d1 create momentum-db 2>&1 || true)
          echo "Create output: $CREATE_OUTPUT"

          # Extract database_id from create output or list output
          DB_ID=$(echo "$CREATE_OUTPUT" | grep -oP 'database_id\s*=\s*"\K[^"]+' || true)

          if [ -z "$DB_ID" ]; then
            echo "Database may already exist, fetching existing ID..."
            LIST_OUTPUT=$(npx wrangler d1 list --json 2>&1)
            echo "List output: $LIST_OUTPUT"
            DB_ID=$(echo "$LIST_OUTPUT" | python3 -c "
          import sys, json
          try:
            data = json.load(sys.stdin)
            dbs = data if isinstance(data, list) else data.get('result', [])
            for db in dbs:
              if db.get('name') == 'momentum-db':
                print(db.get('uuid') or db.get('id', ''))
                break
          except:
            pass
          " 2>/dev/null || true)
          fi

          echo "D1 database_id: $DB_ID"
          echo "db_id=$DB_ID" >> $GITHUB_OUTPUT

      # Patch wrangler.toml with the real database_id
      - name: Patch wrangler.toml database_id
        run: |
          DB_ID="${{ steps.create_d1.outputs.db_id }}"
          if [ -n "$DB_ID" ]; then
            sed -i "s/database_id = \".*\"/database_id = \"$DB_ID\"/" wrangler.toml
            echo "Updated wrangler.toml with database_id: $DB_ID"
            cat wrangler.toml
          else
            echo "Warning: could not determine database_id, using placeholder"
          fi

      # Deploy Worker
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api
          command: deploy

      # Apply D1 schema migration (idempotent due to IF NOT EXISTS)
      - name: Apply D1 migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute momentum-db \
            --file=../../migrations/0001_init.sql \
            --remote 2>&1 || echo "Migration warning (may already be applied)"

      # Set Worker secrets from GitHub Secrets
      - name: Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}"         | npx wrangler secret put ANTHROPIC_API_KEY
          echo "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" | npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
          echo "${{ secrets.LINE_USER_ID }}"              | npx wrangler secret put LINE_USER_ID
          # n8n is optional — only set if secret is provided
          if [ -n "${{ secrets.N8N_WEBHOOK_URL }}" ]; then
            echo "${{ secrets.N8N_WEBHOOK_URL }}"    | npx wrangler secret put N8N_WEBHOOK_URL
            echo "${{ secrets.N8N_WEBHOOK_SECRET }}" | npx wrangler secret put N8N_WEBHOOK_SECRET
          else
            echo "Skipping n8n secrets (not configured)"
          fi

  # ──────────────────────────────────────────────
  # Job 2: Build & Deploy Frontend to Pages
  # ──────────────────────────────────────────────
  deploy-pages:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    needs: deploy-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: https://momentum-api.kvn-liang.workers.dev/api

      - name: Create Pages project (if not exists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create momentum-tracking \
            --production-branch=main 2>&1 || echo "Pages project may already exist, continuing..."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=momentum-tracking --commit-dirty=true
